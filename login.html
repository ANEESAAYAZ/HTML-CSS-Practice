<html>
    <head>
        <title>Login</title>
    </head>
    <body>
        <fieldset>
            <legend>Login Form</legend>
        <h1>Login</h1>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username"><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password"><br><br>
            <input type="submit" value="Login">
            <button>Cancel</button><br><br>
            <label for="remember">Remember me:</label>
            <input type="checkbox" id="remember" name="remember"><br><br>
            OTP:
            <input type="checkbox" id="otp" name="otp"><br><br>
        </fieldset>
        <fieldset>
            <legend>Persinal Details</legend>
            <div>
                Address<textarea rows="4" cols="50" placeholder="Enter your address here..."></textarea><br><br>
            </div>
            <div>
                City:
                <select>
                    <option value="option1">Dubai</option>
                    <option value="option2">Sharjah</option>
                    <option value="option3">Abu Dhabi</option>
                    <option value="option4">Ajman</option>
                    <option value="option5">Ras Al Khaimah</option> 
                    <option value="option6">Fujairah</option>
                    <option value="option7">Umm Al Quwain</option>
                </select>
                <br><br>
            </div>
            <div>
                Gender:
                <input type="radio" id="male" name="gender" value="male"> 
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female"> 
                <label for="female">Female</label>
            </div>
        </fieldset>
            <!-- <label>confirm passowrd</label>
            <input type=":text"/> -->
        </form>
    </body>
</html>
